<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste de Sistemas Operativos — Ambiente de Estudo</title>
<style>
  :root{
    --bg:#0e1420;
    --bg-2:#141d2e;
    --panel:#1a2538;
    --line:#2a3a55;
    --ink:#eef3fa;
    --muted:#93a4be;
    --accent:#ffb703;
    --accent-2:#48cae4;
    --good:#52b788;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;font-family:var(--sans);background:var(--bg);color:var(--ink);
    display:flex;flex-direction:column;height:100vh;overflow:hidden;
  }
  header{
    flex:0 0 auto;padding:14px 22px 0;
    background:linear-gradient(180deg,var(--bg-2),var(--bg));
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:12px}
  .brand h1{
    font-size:18px;margin:0;letter-spacing:.2px;font-weight:700;
  }
  .brand .badge{
    font-family:var(--mono);font-size:11px;color:var(--bg);
    background:var(--accent);padding:2px 8px;border-radius:999px;font-weight:700;
  }
  .brand .sub{font-size:13px;color:var(--muted)}
  .tabs{display:flex;gap:6px;flex-wrap:wrap}
  .tab{
    appearance:none;border:1px solid var(--line);border-bottom:none;
    background:var(--panel);color:var(--muted);
    border-radius:10px 10px 0 0;padding:9px 14px;cursor:pointer;
    display:flex;align-items:center;gap:10px;font-family:var(--sans);
    transition:.15s ease;position:relative;top:1px;
  }
  .tab:hover{color:var(--ink);background:#21304a}
  .tab.active{
    background:var(--bg);color:var(--ink);border-color:var(--line);
    box-shadow:0 -2px 0 var(--accent) inset;
  }
  .tab-icon{font-size:18px;line-height:1}
  .tab-text{display:flex;flex-direction:column;text-align:left;line-height:1.25}
  .tab-title{font-size:13.5px;font-weight:600}
  .tab-desc{font-size:11px;color:var(--muted);font-weight:400}
  .tab.active .tab-desc{color:#aebcd2}
  main{flex:1 1 auto;position:relative;background:#fff}
  .frame{
    position:absolute;inset:0;width:100%;height:100%;border:0;display:none;
    background:#fff;
  }
  .frame.active{display:block}
  @media (max-width:760px){
    .tab-desc{display:none}
    .brand h1{font-size:15px}
    header{padding:10px 12px 0}
  }
</style>
</head>

  // Decode base64 → object URL on first activation (keeps each resumo fully isolated).
  function b64ToBlobUrl(b64){
    const bin = atob(b64);
    const len = bin.length;
    const bytes = new Uint8Array(len);
    for(let i=0;i<len;i++) bytes[i]=bin.charCodeAt(i);
    const blob = new Blob([bytes], {type:'text/html'});
    return URL.createObjectURL(blob);
  }
  function loadFrame(frame){
    if(frame.dataset.loaded) return;
    frame.src = b64ToBlobUrl(frame.dataset.b64);
    frame.dataset.loaded = '1';
    delete frame.dataset.b64; // free memory
  }
  const tabs = Array.from(document.querySelectorAll('.tab'));
  const frames = Array.from(document.querySelectorAll('.frame'));
  function activate(id){
    tabs.forEach(t=>{
      const on = t.dataset.target===id;
      t.classList.toggle('active',on);
      t.setAttribute('aria-selected',on?'true':'false');
    });
    frames.forEach(f=>f.classList.toggle('active',f.id===id));
    const frame = document.getElementById(id);
    loadFrame(frame);
  }
  tabs.forEach(t=>t.addEventListener('click',()=>activate(t.dataset.target)));
  // load the first frame immediately
  loadFrame(frames[0]);
</script>
</body>
